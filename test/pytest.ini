[pytest]
# Run from the project root: pytest tests/ -v
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show short tracebacks, print captured output on failure
addopts = -v --tb=short -p no:warnings

# Markers (no warnings for unknown markers)
markers =
    slow: marks tests as slow (skipped by default with -m "not slow")
    integration: marks integration tests
